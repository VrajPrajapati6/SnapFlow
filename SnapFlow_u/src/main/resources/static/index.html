<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SnapFlow Landing</title>
  <style>
    :root {
      --bg: #F5F7FA;
      --text: #0F172A;
      --muted: #64748B;
      --accent-a: #E65A00;
      --accent-b: #F07A2D;
      --glass: rgba(255,255,255,0.72);
      --glass-border: rgba(15,23,42,0.12);
      --ease: all 0.3s ease;
    }
    body.dark-theme {
      --bg: #000000;
      --text: #FFFFFF;
      --muted: #9CA3AF;
      --glass: rgba(255,255,255,0.05);
      --glass-border: rgba(255,255,255,0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; }
    body {
      font-family: Inter, Poppins, "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(230,90,0,0.09), transparent 35%),
        radial-gradient(circle at 80% 30%, rgba(240,122,45,0.08), transparent 36%),
        radial-gradient(circle at 50% 90%, rgba(230,90,0,0.06), transparent 42%),
        var(--bg);
      animation: floatGlow 16s ease-in-out infinite alternate;
      filter: blur(0.2px);
    }

    .noise {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: 0.03;
      background-image: radial-gradient(rgba(15,23,42,0.20) 0.5px, transparent 0.5px);
      background-size: 3px 3px;
    }
    body.dark-theme .noise {
      opacity: 0.04;
      background-image: radial-gradient(rgba(255,255,255,0.16) 0.5px, transparent 0.5px);
    }

    @keyframes floatGlow {
      0% { transform: translate3d(0, 0, 0) scale(1); }
      100% { transform: translate3d(0, -10px, 0) scale(1.03); }
    }

    .page { position: relative; z-index: 2; min-height: 100vh; }

    .nav-wrap {
      position: sticky;
      top: 0;
      z-index: 20;
      padding: 12px 18px;
    }

    .nav {
      max-width: 1180px;
      margin: 0 auto;
      padding: 7px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      border-radius: 999px;
      border: 1px solid rgba(15,23,42,0.14);
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 10px 26px rgba(15,23,42,0.12);
    }
    body.dark-theme .nav {
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(13,16,22,0.74);
      box-shadow: 0 14px 30px rgba(0,0,0,0.35);
    }

    .logo { font-size: 23px; font-weight: 800; letter-spacing: -0.4px; margin-right: auto; }

    .menu {
      display: flex;
      align-items: center;
      gap: 10px;
      list-style: none;
      color: #111111;
      font-size: 15px;
      margin-left: auto;
    }
    .menu a {
      text-decoration: none;
      color: inherit;
      transition: var(--ease);
      padding: 9px 16px;
      border-radius: 999px;
      font-weight: 500;
    }
    .menu a:hover { color: var(--text); background: rgba(15,23,42,0.08); }
    body.dark-theme .menu a:hover { color: #fff; background: rgba(255,255,255,0.08); }
    body.dark-theme .menu { color: #E5E7EB; }
    .menu a.active {
      color: #fff;
      background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
      box-shadow: 0 8px 18px rgba(230,90,0,0.30);
    }

    .right-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .theme-toggle {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      border: 1px solid rgba(15,23,42,0.2);
      background: rgba(15,23,42,0.05);
      color: #334155;
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: var(--ease);
    }
    .theme-toggle:hover {
      transform: translateY(-1px);
      background: rgba(15,23,42,0.1);
      color: #0F172A;
    }
    body.dark-theme .theme-toggle {
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.04);
      color: #DFE6EE;
    }
    body.dark-theme .theme-toggle:hover {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }

    .nav-btn {
      border: 1px solid rgba(15,23,42,0.2);
      background: rgba(15,23,42,0.07);
      color: #0F172A;
      border-radius: 999px;
      padding: 10px 18px;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
      transition: var(--ease);
    }
    .nav-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(15,23,42,0.18); background: rgba(15,23,42,0.12); }
    body.dark-theme .nav-btn {
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: #F2F5F9;
    }
    body.dark-theme .nav-btn:hover {
      box-shadow: 0 8px 22px rgba(0,0,0,0.35);
      background: rgba(255,255,255,0.14);
    }

    .hero {
      max-width: 1180px;
      margin: 0 auto;
      padding: 74px 24px 72px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .hero h1 {
      font-size: clamp(36px, 5.2vw, 62px);
      line-height: 1.03;
      letter-spacing: -1.3px;
      font-weight: 800;
      color: #0A0A0A;
      max-width: 980px;
      opacity: 0;
      transform: translateY(18px);
      animation: fadeUp 0.85s ease forwards;
    }
    body.dark-theme .hero h1 { color: #FFFFFF; }

    .hero p {
      margin-top: 14px;
      color: var(--muted);
      max-width: 760px;
      font-size: clamp(15px, 2vw, 21px);
      line-height: 1.6;
      opacity: 0;
      transform: translateY(18px);
      animation: fadeUp 0.95s ease 0.1s forwards;
    }

    .glass-card {
      margin-top: 42px;
      width: min(760px, 96%);
      border-radius: 20px;
      border: 1px solid var(--glass-border);
      background: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03)), var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.55);
      padding: 28px;
      text-align: left;
      opacity: 0;
      transform: translateY(24px);
      animation: fadeUp 1s ease 0.2s forwards;
      transition: var(--ease);
    }
    .glass-card:hover { transform: scale(1.02); }

    .glass-card h2 {
      font-size: clamp(22px, 3vw, 30px);
      margin-bottom: 18px;
      letter-spacing: -0.5px;
      text-align: center;
    }

    .chip-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .chip {
      border: 1px solid rgba(15,23,42,0.12);
      background: rgba(255,255,255,0.58);
      border-radius: 12px;
      padding: 14px;
      font-weight: 600;
      color: var(--text);
      transition: var(--ease);
      box-shadow: 0 4px 14px rgba(15,23,42,0.08);
    }
    .chip:hover { transform: translateY(-2px); background: rgba(255,255,255,0.85); box-shadow: 0 8px 18px rgba(15,23,42,0.12); }
    body.dark-theme .chip {
      color: #EDEDED;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      box-shadow: 0 4px 14px rgba(0,0,0,0.25);
    }
    body.dark-theme .chip:hover { background: rgba(255,255,255,0.1); box-shadow: 0 8px 18px rgba(0,0,0,0.35); }

    .cta {
      margin-top: 30px;
      border: 0;
      border-radius: 999px;
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      background: linear-gradient(135deg, #C84E00, #E06210);
      box-shadow: 0 12px 30px rgba(200,78,0,0.38);
      transition: var(--ease);
      position: relative;
      overflow: hidden;
    }
    .cta:hover { transform: translateY(-2px) scale(1.03); box-shadow: 0 16px 34px rgba(200,78,0,0.52); }
    .cta:active { transform: scale(0.98); }

    .ripple {
      position: absolute;
      border-radius: 50%;
      transform: scale(0);
      animation: ripple 0.6s linear;
      background: rgba(255,255,255,0.45);
      pointer-events: none;
    }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
    @keyframes ripple { to { transform: scale(4); opacity: 0; } }

    @media (max-width: 820px) {
      .nav { flex-wrap: wrap; justify-content: center; }
      .logo { width: 100%; text-align: center; }
      .menu { flex-wrap: wrap; justify-content: center; }
      .right-actions { width: 100%; justify-content: center; }
      .chip-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body class="">
  <div class="bg"></div>
  <div class="noise"></div>

  <div class="page">
    <header class="nav-wrap">
      <nav class="nav">
        <div class="logo">SnapFlow</div>
        <ul class="menu">
          <li><a class="active" href="index.html">Home</a></li>
          <li><a href="manages.html">Manages</a></li>
          <li><a href="about.html">About us</a></li>
        </ul>
        <div class="right-actions">
          <button id="themeToggle" class="theme-toggle" aria-label="Toggle page tone">
            <svg id="toggleIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"></path>
            </svg>
          </button>
          <button id="getStartedBtn" class="nav-btn">Get Started</button>
        </div>
      </nav>
    </header>

    <main class="hero">
      <h1>Automate your workflow like never before.</h1>
      <p>Create smart flows to open apps, links, and files with perfect timing.</p>

      <section class="glass-card" id="card">
        <h2>Build your automation flow</h2>
        <div class="chip-grid">
          <div class="chip">Open Websites</div>
          <div class="chip">Launch Apps</div>
          <div class="chip">Run Files</div>
          <div class="chip">Custom Delay Control</div>
        </div>
      </section>

      <button id="cta" class="cta">Start Building</button>
    </main>
  </div>

  <script>
    (function () {
      const cta = document.getElementById("cta");
      const getStartedBtn = document.getElementById("getStartedBtn");
      const card = document.getElementById("card");
      const themeToggle = document.getElementById("themeToggle");
      const toggleIcon = document.getElementById("toggleIcon");

      const applyTheme = (theme) => {
        if (theme === "dark") {
          document.body.classList.add("dark-theme");
        } else {
          document.body.classList.remove("dark-theme");
        }
        localStorage.setItem("snapflow-theme", theme);
        applyToggleIcon();
      };

      const applyToggleIcon = function () {
        const isDark = document.body.classList.contains("dark-theme");
        if (isDark) {
          toggleIcon.innerHTML = '<path d="M12 3v2M12 19v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M3 12h2M19 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path><circle cx="12" cy="12" r="4"></circle>';
        } else {
          toggleIcon.innerHTML = '<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"></path>';
        }
      };

      // Apply saved theme immediately
      const savedTheme = localStorage.getItem("snapflow-theme") || "light";
      applyTheme(savedTheme);

      cta.addEventListener("click", function (e) {
        const rect = this.getBoundingClientRect();
        const ripple = document.createElement("span");
        const size = Math.max(rect.width, rect.height);
        ripple.className = "ripple";
        ripple.style.width = size + "px";
        ripple.style.height = size + "px";
        ripple.style.left = (e.clientX - rect.left - size / 2) + "px";
        ripple.style.top = (e.clientY - rect.top - size / 2) + "px";
        this.appendChild(ripple);
        setTimeout(function () { ripple.remove(); }, 620);
        window.setTimeout(function () {
          window.location.href = "manages.html";
        }, 180);
      });

      getStartedBtn.addEventListener("click", function () {
        window.location.href = "manages.html";
      });

      let raf = null;
      window.addEventListener("mousemove", function (e) {
        if (window.innerWidth < 820) return;
        if (raf) cancelAnimationFrame(raf);
        raf = requestAnimationFrame(function () {
          const x = (e.clientX / window.innerWidth - 0.5) * 10;
          const y = (e.clientY / window.innerHeight - 0.5) * 10;
          card.style.transform = "translate3d(" + x + "px," + y + "px,0)";
        });
      });

      window.addEventListener("mouseleave", function () {
        card.style.transform = "";
      });

      themeToggle.addEventListener("click", function () {
        const isDark = document.body.classList.contains("dark-theme");
        applyTheme(isDark ? "light" : "dark");
      });
    })();
  </script>
</body>
</html>
